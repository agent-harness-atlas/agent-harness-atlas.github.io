<!doctype html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Detail · Harness Atlas</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ===== Critique editorial system — warm paper, rust accent ===== */
      --bg:     #f5f3ee;
      --paper:  #ffffff;
      --raised: #efece4;
      --ink:    #1a1a1c;
      --muted:  #6b6964;
      --faint:  #8d8a82;
      --rule:   #e2dfd7;
      --rule-strong: #d3cfc4;
      --accent: #c96442;

      /* score bands (semantic, not rainbow) */
      --exceptional: #c96442;  /* rust — the brand high note */
      --strong:      #4a7a3f;  /* green */
      --functional:  #9a7b3a;  /* ochre */
      --broken:      #a83a2a;  /* deep red */
      --pending:     #b4b0a6;  /* grey */

      --serif: 'Source Serif 4', Georgia, 'Songti SC', serif;
      --sans:  'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', system-ui, sans-serif;
      --mono:  'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;
      --r: 6px;
      --shadow: 0 1px 2px rgba(26,26,28,0.04), 0 1px 0 rgba(26,26,28,0.02);
    }
    html[data-theme="dark"] {
      --bg:     #16140f;
      --paper:  #1d1b15;
      --raised: #232019;
      --ink:    #f2efe6;
      --muted:  #a8a294;
      --faint:  #807a6c;
      --rule:   #322e25;
      --rule-strong: #423d31;
      --accent: #e08763;
      --exceptional: #e08763;
      --strong:      #7faa6f;
      --functional:  #c2a25f;
      --broken:      #d8674f;
      --pending:     #555044;
      --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 1px 0 rgba(0,0,0,0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 16px; line-height: 1.55;
      transition: background .25s ease, color .25s ease;
    }
    ::selection { background: color-mix(in srgb, var(--accent) 24%, transparent); }
    a { color: var(--accent); text-decoration: none; }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 0 40px; }

    /* ===== Sticky nav (added for theme/lang toggles + back) ===== */
    nav.topbar {
      position: sticky; top: 0; z-index: 50;
      background: color-mix(in srgb, var(--bg) 84%, transparent);
      backdrop-filter: blur(12px) saturate(1.3); -webkit-backdrop-filter: blur(12px) saturate(1.3);
      border-bottom: 1px solid var(--rule);
    }
    .topbar .bar { display: flex; align-items: center; gap: 16px; height: 60px; }
    .brand { display: flex; align-items: center; gap: 9px; }
    .brand .logo { display: inline-flex; color: var(--ink); }
    .brand .logo svg { width: 24px; height: 24px; display: block; }
    .brand .mark { font: 700 18px/1 var(--serif); letter-spacing: -0.01em; color: var(--ink); }
    .brand .mark b { color: var(--accent); font-style: italic; }
    .brand .ver { font: 500 10px/1 var(--mono); color: var(--faint); letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 7px; border: 1px solid var(--rule); border-radius: 5px; }
    .brand:hover .mark { color: var(--accent); }
    .spacer { flex: 1; }
    .icon-btn { display: inline-grid; place-items: center; width: 34px; height: 34px; background: var(--raised); border: 1px solid var(--rule); border-radius: var(--r); color: var(--muted); cursor: pointer; transition: color .15s, border-color .15s, background .15s; }
    .icon-btn:hover { color: var(--ink); border-color: var(--rule-strong); }
    .icon-btn svg { grid-area: 1 / 1; }
    .icon-btn .i-en, .icon-btn .i-moon { display: none; }
    html[lang="en"] .icon-btn .i-zh { display: none; }
    html[lang="en"] .icon-btn .i-en { display: block; }
    html[data-theme="dark"] .icon-btn .i-sun { display: none; }
    html[data-theme="dark"] .icon-btn .i-moon { display: block; }

    /* ===== Header / masthead ===== */
    .hd {
      display: flex; justify-content: space-between; align-items: flex-end;
      gap: 40px; padding: 52px 0 28px; border-bottom: 1px solid var(--rule); margin-bottom: 40px;
    }
    .hd-left { display: flex; gap: 22px; align-items: flex-start; }
    .glyph {
      width: 60px; height: 60px; flex: none; border-radius: 10px;
      display: grid; place-items: center; font: 700 24px/1 var(--serif);
      letter-spacing: -0.02em; color: #fff;
      box-shadow: var(--shadow);
    }
    .glyph svg { width: 32px; height: 32px; display: block; color: inherit; }
    .glyph.is-mono { box-shadow: var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.10); }
    html[data-theme="dark"] .glyph.is-mono { box-shadow: var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.16), 0 0 0 1px var(--rule-strong); }
    .hd-meta {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--muted);
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .hd-title { font-family: var(--serif); font-weight: 700; font-size: clamp(34px, 4.4vw, 54px); line-height: 1.04; letter-spacing: -0.015em; }
    .hd-tagline { font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em; color: var(--muted); margin-top: 9px; }
    .hd-verdict {
      font-family: var(--serif); font-style: italic; font-size: 17px; line-height: 1.5;
      color: var(--muted); max-width: 38ch; text-align: right; flex: none;
    }
    .hd-verdict .vlabel { display: block; font-family: var(--mono); font-style: normal; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--faint); margin-bottom: 7px; text-align: right; }
    .hd-verdict strong { color: var(--ink); font-style: normal; font-weight: 600; }
    @media (max-width: 860px) {
      .hd { flex-direction: column; align-items: flex-start; gap: 24px; }
      .hd-verdict { text-align: left; max-width: none; }
      .hd-verdict .vlabel { text-align: left; }
    }

    /* ===== disclaimer strip ===== */
    .disc {
      display: flex; align-items: center; gap: 10px;
      margin: 0 0 40px; padding: 12px 16px;
      border: 1px solid color-mix(in srgb, var(--functional) 36%, var(--rule));
      background: color-mix(in srgb, var(--functional) 8%, transparent);
      border-radius: var(--r); font-family: var(--serif); font-size: 14px; line-height: 1.5; color: var(--muted);
    }
    .disc svg { flex: none; color: var(--functional); }

    /* ===== Top: radar + score table ===== */
    .top { display: grid; grid-template-columns: 360px 1fr; gap: 48px; margin-bottom: 56px; align-items: center; }
    @media (max-width: 860px) { .top { grid-template-columns: 1fr; gap: 32px; } }
    .radar-card { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--r); padding: 24px; text-align: center; box-shadow: var(--shadow); }
    .radar-card .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .radar-card svg { width: 100%; height: auto; max-width: 300px; }
    .radar-card .overall { font-family: var(--serif); font-size: 13px; color: var(--muted); margin-top: 18px; }
    .radar-card .overall .n { font-weight: 700; font-size: 20px; color: var(--ink); letter-spacing: -0.01em; }
    .radar-card .overall em { font-style: italic; }

    .scores { display: flex; flex-direction: column; }
    .score-row { display: grid; grid-template-columns: 18ch 1fr 6ch 13ch; gap: 16px; align-items: center; padding: 14px 0; border-top: 1px solid var(--rule); }
    .score-row:first-child { border-top: 0; }
    .score-name { font-family: var(--serif); font-weight: 600; font-size: 17px; }
    .score-name .en { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); font-weight: 400; margin-top: 2px; }
    .score-bar { position: relative; height: 4px; background: var(--rule); border-radius: 2px; overflow: hidden; }
    .score-bar-fill { position: absolute; inset: 0 auto 0 0; background: var(--c, var(--ink)); border-radius: 2px; }
    .score-num { font-family: var(--serif); font-weight: 700; font-size: 24px; letter-spacing: -0.02em; text-align: right; }
    .score-num .denom { font-size: 13px; color: var(--muted); font-weight: 400; }
    .score-num.is-pending { color: var(--faint); }
    .score-band { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; text-align: right; color: var(--c, var(--muted)); }

    /* band color hooks */
    .b-exceptional { --c: var(--exceptional); }
    .b-strong      { --c: var(--strong); }
    .b-functional  { --c: var(--functional); }
    .b-broken      { --c: var(--broken); }
    .b-pending     { --c: var(--pending); }

    /* ===== Section title ===== */
    .section-title { font-family: var(--serif); font-weight: 600; font-size: 22px; letter-spacing: -0.005em; margin: 56px 0 20px; padding-bottom: 12px; border-bottom: 1px solid var(--rule); }
    .section-title .en { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); font-weight: 400; margin-left: 10px; }

    /* ===== Dimension cards ===== */
    /* minmax(0, 1fr) (not bare 1fr) so long unbreakable content — file-path
       citations — can't blow a column past its 50% share and desync card widths. */
    .dim-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 24px; }
    @media (max-width: 860px) { .dim-grid { grid-template-columns: 1fr; } }
    .dim { min-width: 0; background: var(--paper); border: 1px solid var(--rule); border-radius: var(--r); padding: 22px 24px; box-shadow: var(--shadow); }
    .dim-head { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; margin-bottom: 4px; }
    .dim-name { font-family: var(--serif); font-weight: 600; font-size: 19px; }
    .dim-name .en { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); font-weight: 400; margin-top: 2px; }
    .dim-score { font-family: var(--serif); font-weight: 700; font-size: 26px; letter-spacing: -0.02em; color: var(--c, var(--ink)); white-space: nowrap; }
    .dim-score .denom { font-size: 13px; color: var(--muted); font-weight: 400; }
    .dim-score.is-pending { color: var(--faint); }
    .dim-band { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--c, var(--muted)); display: block; text-align: right; margin-top: 2px; }
    .dim-evidence { font-family: var(--serif); font-size: 14.5px; line-height: 1.62; color: color-mix(in srgb, var(--ink) 86%, var(--muted)); margin: 12px 0 18px; }
    .dim-evidence code { font-family: var(--mono); font-size: 0.86em; background: var(--raised); padding: 1px 6px; border-radius: 3px; }
    .dim-tags { display: flex; flex-direction: column; gap: 12px; }
    .tag-row { display: grid; grid-template-columns: 58px 1fr; gap: 12px; font-size: 13.5px; line-height: 1.55; align-items: start; }
    .tag-body { font-family: var(--serif); color: color-mix(in srgb, var(--ink) 82%, var(--muted)); }
    .tag-body code { font-family: var(--mono); font-size: 0.84em; background: var(--raised); padding: 1px 5px; border-radius: 3px; }
    .tag-lead { display: block; margin-bottom: 5px; }
    .tag-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 5px; }
    .tag-list li { position: relative; padding-left: 15px; }
    .tag-list li::before { content: ""; position: absolute; left: 2px; top: 0.62em; width: 4px; height: 4px; border-radius: 50%; background: var(--c, var(--muted)); }
    .tag { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; padding: 4px 0; border-radius: 3px; color: #fff; text-align: center; align-self: start; }
    html[data-theme="dark"] .tag { color: #16140f; }
    .tag-keep { background: var(--strong); }
    .tag-fix { background: var(--accent); }

    /* ===== Footer ===== */
    .ft { margin-top: 72px; padding: 24px 0 56px; border-top: 1px solid var(--rule); display: flex; justify-content: center; align-items: baseline; gap: 16px; flex-wrap: wrap; font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
    .ft .br { color: var(--ink); font-weight: 600; }

    .notfound { padding: 90px 0; text-align: center; font-family: var(--serif); font-size: 18px; color: var(--muted); }
    .notfound a { font-weight: 600; }

    @media (max-width: 560px) { .wrap { padding: 0 20px; } }

    /* ===== Radar chart (ported from template inline styles) ===== */
    .radar-card .axis { stroke: var(--rule-strong); stroke-width: 1; fill: none; }
    .radar-card .grid { stroke: var(--rule); stroke-width: 1; fill: none; }
    .radar-card .grid-mid { stroke: var(--rule-strong); stroke-width: 1; fill: none; }
    .radar-card .area { fill: color-mix(in srgb, var(--accent) 18%, transparent); stroke: var(--accent); stroke-width: 1.6; stroke-linejoin: round; }
    .radar-card .dot { fill: var(--accent); }
    .radar-card .axis-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; fill: var(--muted); }

    /* ===== Evidence basis label ===== */
    .basis { display: inline-flex; align-items: center; gap: 12px; margin: 0 0 32px; padding: 9px 14px; border-radius: var(--r); border: 1px solid var(--rule); background: var(--raised); flex-wrap: wrap; }
    .basis .basis-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600; padding: 3px 9px; border-radius: 4px; color: #fff; }
    html[data-theme="dark"] .basis .basis-tag { color: #16140f; }
    .basis-source .basis-tag { background: var(--strong); }
    .basis-docs .basis-tag { background: var(--functional); }
    .basis .basis-note { font-family: var(--serif); font-size: 13px; line-height: 1.45; color: var(--muted); }

    /* ===== Per-dimension citations (card footer, pinned to bottom) ===== */
    .dim { display: flex; flex-direction: column; }
    .dim-tags { flex: 1 1 auto; }
    .dim-cites { display: flex; flex-wrap: wrap; align-items: baseline; gap: 7px 10px; margin: 18px 0 0; padding-top: 14px; border-top: 1px dashed var(--rule); }
    .dim-cites .cites-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--faint); flex: 0 0 auto; }
    .dim-cites .cites-list { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 10px; flex: 1 1 auto; }
    .cite { font-family: var(--mono); font-size: 11px; line-height: 1.4; color: var(--muted); border-bottom: 1px solid transparent; transition: color .15s, border-color .15s; word-break: break-all; }
    .cite:hover { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, transparent); }
    .cite code { font-family: var(--mono); font-size: 0.94em; background: var(--raised); padding: 1px 5px; border-radius: 3px; color: inherit; }
    .cite-doc { color: var(--accent); }
  </style>
</head>
<body>
  <nav class="topbar">
    <div class="wrap bar">
      <a class="brand" href="index.html" title="返回矩阵 / Back to matrix">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Chess knight piece: a horse-head profile mounted on a stepped,
                 flared base — the universally recognizable chess "knight" silhouette.
                 currentColor body, one rust datum for the eye. -->
            <path d="M8.2 6.1c0.9-1.4 2.3-2.4 3.9-2.8l0.5-1.4c0.2-0.6 1-0.6 1.3-0.1l0.8 1.4c2.9 0.7 5.1 3.1 5.5 6.1l0.9 6.6c0.1 0.9-0.5 1.6-1.4 1.6h-1.1c0.4 0.6 0.6 1.3 0.6 2v1.1h-12v-1.5c0-2.7 1.3-4.4 3.4-5.8 0.8-0.5 1-1 0.6-1.6-0.8 0.6-1.6 0.9-2.5 0.7-1-0.2-1.5-1.1-1.3-2 0.2-0.8 0.8-1.2 0.9-2 0.1-0.9-0.3-1.6 0.3-2.6 0.3-0.5 0.6-0.9 0.9-1.3 0.1 0.6 0.2 1.2 0.5 1.3 0.5 0.2 0.9-0.5 1-1.1z" fill="currentColor"/>
            <path d="M9 21.4h11.4c0.7 0 1.2 0.5 1.3 1.2l0.2 1.5c0.1 0.5-0.3 0.9-0.8 0.9h-13c-0.5 0-0.9-0.4-0.8-0.9l0.2-1.5c0.1-0.7 0.6-1.2 1.3-1.2z" fill="currentColor"/>
            <circle cx="13.4" cy="7.6" r="1.05" fill="var(--accent)"/>
          </svg>
        </span>
        <span class="mark">Agent Harness <b>Atlas</b></span>
      </a>
      <span class="spacer"></span>
      <button class="icon-btn" id="langBtn" type="button" aria-label="Switch language" title="中文 / English">
        <svg viewBox="0 0 24 24" width="19" height="19" fill="currentColor" aria-hidden="true">
          <path d="M18.5 10L22.9 21H20.745L19.544 18H15.454L14.255 21H12.101L16.5 10H18.5ZM10 2V4H16V6L14.0322 6.0006C13.2425 8.36616 11.9988 10.5057 10.4115 12.301C11.1344 12.9457 11.917 13.5176 12.7475 14.0079L11.9969 15.8855C10.9237 15.2781 9.91944 14.5524 8.99961 13.7249C7.21403 15.332 5.10914 16.5553 2.79891 17.2734L2.26257 15.3442C4.2385 14.7203 6.04543 13.6737 7.59042 12.3021C6.46277 11.0281 5.50873 9.57985 4.76742 8.00028L7.00684 8.00037C7.57018 9.03885 8.23979 10.0033 8.99967 10.877C10.2283 9.46508 11.2205 7.81616 11.9095 6.00101L2 6V4H8V2H10ZM17.5 12.8852L16.253 16H18.745L17.5 12.8852Z"/>
        </svg>
      </button>
      <button class="icon-btn" id="themeBtn" type="button" aria-label="Toggle theme" title="浅色 / 深色">
        <svg class="i-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.7"/>
          <path d="M12 2v2.5M12 19.5V22M22 12h-2.5M4.5 12H2M19.07 4.93l-1.77 1.77M6.7 17.3l-1.77 1.77M19.07 19.07l-1.77-1.77M6.7 6.7 4.93 4.93" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
        <svg class="i-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
          <path d="M20 14.5A8 8 0 0 1 9.5 4 7 7 0 1 0 20 14.5Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </nav>

  <main class="wrap" id="root"></main>

  <script type="module" src="/src/agent.ts"></script>
</body>
</html>
