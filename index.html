<!doctype html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Harness Atlas</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ===== Critique editorial system — warm paper, rust accent ===== */
      --bg:     #f5f3ee;
      --paper:  #ffffff;
      --raised: #efece4;
      --ink:    #1a1a1c;
      --muted:  #6b6964;
      --faint:  #8d8a82;
      --rule:   #e2dfd7;
      --rule-strong: #d3cfc4;
      --accent: #c96442;

      --exceptional: #c96442;
      --strong:      #4a7a3f;
      --functional:  #9a7b3a;
      --broken:      #a83a2a;
      --pending:     #b4b0a6;

      --serif: 'Source Serif 4', Georgia, 'Songti SC', serif;
      --sans:  'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', system-ui, sans-serif;
      --mono:  'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;
      --r: 6px;
      --shadow: 0 1px 2px rgba(26,26,28,0.04), 0 1px 0 rgba(26,26,28,0.02);
    }
    html[data-theme="dark"] {
      --bg:     #16140f;
      --paper:  #1d1b15;
      --raised: #232019;
      --ink:    #f2efe6;
      --muted:  #a8a294;
      --faint:  #807a6c;
      --rule:   #322e25;
      --rule-strong: #423d31;
      --accent: #e08763;
      --exceptional: #e08763;
      --strong:      #7faa6f;
      --functional:  #c2a25f;
      --broken:      #d8674f;
      --pending:     #555044;
      --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 1px 0 rgba(0,0,0,0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 16px; line-height: 1.55; transition: background .25s ease, color .25s ease; }
    ::selection { background: color-mix(in srgb, var(--accent) 24%, transparent); }
    a { color: var(--accent); text-decoration: none; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 0 40px; }

    /* ===== Sticky nav ===== */
    nav.topbar { position: sticky; top: 0; z-index: 50; background: color-mix(in srgb, var(--bg) 84%, transparent); backdrop-filter: blur(12px) saturate(1.3); -webkit-backdrop-filter: blur(12px) saturate(1.3); border-bottom: 1px solid var(--rule); }
    .topbar .bar { display: flex; align-items: center; gap: 16px; height: 60px; }
    .brand { display: flex; align-items: center; gap: 9px; }
    .brand .logo { display: inline-flex; color: var(--ink); }
    .brand .logo svg { width: 24px; height: 24px; display: block; }
    .brand .mark { font: 700 18px/1 var(--serif); letter-spacing: -0.01em; }
    .brand .mark b { color: var(--accent); font-style: italic; }
    .brand .ver { font: 500 10px/1 var(--mono); color: var(--faint); letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 7px; border: 1px solid var(--rule); border-radius: 5px; }
    .spacer { flex: 1; }
    .icon-btn { display: inline-grid; place-items: center; width: 34px; height: 34px; background: var(--raised); border: 1px solid var(--rule); border-radius: var(--r); color: var(--muted); cursor: pointer; transition: color .15s, border-color .15s, background .15s; }
    .icon-btn:hover { color: var(--ink); border-color: var(--rule-strong); }
    .icon-btn svg { grid-area: 1 / 1; }
    .icon-btn .i-en, .icon-btn .i-moon { display: none; }
    html[lang="en"] .icon-btn .i-zh { display: none; }
    html[lang="en"] .icon-btn .i-en { display: block; }
    html[data-theme="dark"] .icon-btn .i-sun { display: none; }
    html[data-theme="dark"] .icon-btn .i-moon { display: block; }

    /* ===== Masthead ===== */
    .hd { display: flex; justify-content: space-between; align-items: flex-start; gap: 40px; padding: 56px 0 30px; border-bottom: 1px solid var(--rule); margin-bottom: 34px; }
    .hd-meta { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .hd-title { font-family: var(--serif); font-weight: 700; font-size: clamp(34px, 4.6vw, 56px); line-height: 1.03; letter-spacing: -0.018em; max-width: 18ch; }
    .hd-title em { font-style: italic; color: var(--accent); }
    .hd-lede { font-family: var(--serif); font-style: italic; font-size: 17px; line-height: 1.5; color: var(--muted); max-width: 34ch; text-align: right; flex: none; margin-top: 23px; }
    .hd-lede strong { color: var(--ink); font-style: normal; font-weight: 600; }
    @media (max-width: 860px) { .hd { flex-direction: column; align-items: flex-start; gap: 20px; } .hd-lede { text-align: left; max-width: none; margin-top: 0; } }

    /* ===== Matrix ===== */
    .mx-cap { display: flex; align-items: baseline; gap: 12px; margin: 0 0 16px; }
    .mx-cap h2 { font-family: var(--serif); font-weight: 600; font-size: 21px; letter-spacing: -0.005em; }
    .mx-cap .en { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

    .matrix-shell { border: 1px solid var(--rule); border-radius: var(--r); background: var(--paper); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 18px; }
    .scroll-x { overflow-x: auto; }
    table { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 1092px; table-layout: fixed; }
    /* equal-width dimension columns: agent col fixed, 6 dims share equal width, score+detail fixed */
    col.c-agent { width: 220px; }
    col.c-dim { width: 116px; }
    col.c-score { width: 92px; }
    col.c-detail { width: 84px; }
    thead th { position: sticky; top: 0; background: var(--raised); text-align: left; padding: 15px 12px; border-bottom: 1px solid var(--rule-strong); white-space: normal; vertical-align: bottom; }
    thead th .dim-zh { display: block; font-family: var(--serif); color: var(--ink); font-weight: 600; font-size: 14px; letter-spacing: -0.005em; }
    thead th .dim-en { display: block; font: 400 8.5px/1.3 var(--mono); color: var(--faint); margin-top: 4px; letter-spacing: 0.01em; text-transform: uppercase; white-space: nowrap; }
    thead th.col-agent { left: 0; z-index: 2; min-width: 208px; }
    thead th.col-agent .dim-en { letter-spacing: 0.2em; }
    thead th.col-score { text-align: right; }
    thead th.col-score .dim-zh, thead th.col-score .dim-en { text-align: right; }

    tbody td { padding: 0; border-bottom: 1px solid var(--rule); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover td { background: color-mix(in srgb, var(--accent) 5%, transparent); }

    .agent-cell { position: sticky; left: 0; z-index: 1; background: var(--paper); padding: 15px 16px 15px 16px; display: flex; align-items: center; gap: 11px; min-width: 220px; border-right: 1px solid var(--rule); }
    tbody tr:hover .agent-cell { background: color-mix(in srgb, var(--accent) 5%, var(--paper)); }
    .agent-rank { flex: none; width: 18px; text-align: center; font: 600 13px/1 var(--mono); color: var(--faint); font-variant-numeric: tabular-nums; }
    .agent-glyph { width: 36px; height: 36px; flex: none; border-radius: 8px; display: grid; place-items: center; font: 700 15px/1 var(--serif); letter-spacing: -0.02em; color: #fff; }
    .agent-glyph svg { width: 20px; height: 20px; display: block; color: inherit; }
    .agent-glyph.is-mono { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.10); }
    html[data-theme="dark"] .agent-glyph.is-mono { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.16), 0 0 0 1px var(--rule-strong); }
    .agent-name { font: 600 15px/1.15 var(--serif); letter-spacing: -0.01em; }
    .agent-vendor { margin-top: 4px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .agent-ver { font: 400 10px/1.3 var(--mono); color: var(--faint); letter-spacing: 0.08em; text-transform: none; white-space: nowrap; }

    /* numeric score cell — editorial serif numerals */
    td.cell { position: relative; padding: 13px 14px; text-align: center; }
    .scorebox { display: inline-flex; flex-direction: column; align-items: center; gap: 5px; min-width: 56px; }
    .scorebox .num { font: 700 22px/1 var(--serif); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; color: var(--c, var(--ink)); }
    .scorebox.is-pending .num { color: var(--faint); font-weight: 400; }
    .scorebox .track { width: 100%; height: 3px; border-radius: 2px; background: var(--rule); overflow: hidden; }
    .scorebox .track i { display: block; height: 100%; border-radius: 2px; background: var(--c, var(--ink)); width: var(--w, 0%); }
    .scorebox.is-pending .track { background: repeating-linear-gradient(90deg, var(--pending) 0 3px, transparent 3px 7px); }
    .b-exceptional { --c: var(--exceptional); }
    .b-strong { --c: var(--strong); }
    .b-functional { --c: var(--functional); }
    .b-broken { --c: var(--broken); }
    .b-pending { --c: var(--pending); }

    /* hover tooltip → evidence */
    .tip { position: absolute; z-index: 30; left: 50%; bottom: calc(100% - 4px); transform: translateX(-50%) translateY(4px); width: 250px; background: var(--ink); color: var(--bg); padding: 11px 13px; border-radius: var(--r); font-family: var(--serif); font-size: 13px; line-height: 1.5; text-align: left; opacity: 0; pointer-events: none; transition: opacity .14s ease, transform .14s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.22); }
    .tip .ev { display: block; margin-top: 7px; font: 500 10px/1.4 var(--mono); letter-spacing: 0.04em; opacity: 0.72; }
    td.cell:hover .tip { opacity: 1; transform: translateX(-50%) translateY(0); }
    /* top row flips downward so the tip never covers the sticky header */
    .tip.tip-below { bottom: auto; top: calc(100% - 4px); transform: translateX(-50%) translateY(-4px); }
    td.cell:hover .tip.tip-below { transform: translateX(-50%) translateY(0); }

    /* overall score column */
    .score-cell { text-align: right; padding: 13px 18px 13px 10px; white-space: nowrap; }
    .ov { display: inline-flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .ov .n { font: 700 24px/1 var(--serif); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; color: var(--c, var(--ink)); }
    .ov.is-pending .n { color: var(--faint); font-weight: 400; }
    .ov .bd { font: 400 9px/1 var(--mono); letter-spacing: 0.18em; text-transform: uppercase; color: var(--c, var(--muted)); }

    .detail-cell { text-align: right; padding: 13px 16px 13px 4px; }
    .go { display: inline-flex; align-items: center; gap: 5px; font: 500 11px/1 var(--mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); padding: 8px 11px; border-radius: var(--r); border: 1px solid transparent; transition: all .15s ease; white-space: nowrap; }
    .go:hover { border-color: color-mix(in srgb, var(--accent) 50%, transparent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
    .go svg { transition: transform .15s ease; }
    .go:hover svg { transform: translateX(2px); }

    /* ===== legend ===== */
    .legend { display: flex; flex-wrap: wrap; align-items: center; gap: 18px; margin: 8px 2px 64px; font: 500 12px/1 var(--mono); letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .legend .lg-title { font-size: 10px; letter-spacing: 0.2em; color: var(--faint); }
    .legend .lg { display: inline-flex; align-items: center; gap: 8px; font-size: 10px; }
    .legend .sw { width: 22px; height: 4px; border-radius: 2px; background: var(--c); }

    /* ===== Footer ===== */
    .ft { margin-top: 8px; padding: 26px 0 56px; border-top: 1px solid var(--rule); display: flex; justify-content: center; align-items: baseline; gap: 16px; flex-wrap: wrap; font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
    .ft .br { color: var(--ink); font-weight: 600; }

    @media (max-width: 560px) { .wrap { padding: 0 20px; } .hd { padding: 36px 0 24px; } }
  </style>
</head>
<body>
  <nav class="topbar">
    <div class="wrap bar">
      <div class="brand">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 448 512" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M96 48L82.7 61.3C70.7 73.3 64 89.5 64 106.5l0 132.4c0 10.7 5.3 20.7 14.2 26.6l10.6 7c14.3 9.6 32.7 10.7 48.1 3l3.2-1.6c2.6-1.3 5-2.8 7.3-4.5l49.4-37c6.6-5 15.7-5 22.3 0c10.2 7.7 9.9 23.1-.7 30.3L90.4 350C73.9 361.3 64 380 64 400l320 0 28.9-159c2.1-11.3 3.1-22.8 3.1-34.3l0-14.7C416 86 330 0 224 0L83.8 0C72.9 0 64 8.9 64 19.8c0 7.5 4.2 14.3 10.9 17.7L96 48zm24 68a20 20 0 1 1 40 0 20 20 0 1 1 -40 0zM22.6 473.4c-4.2 4.2-6.6 10-6.6 16C16 501.9 26.1 512 38.6 512l370.7 0c12.5 0 22.6-10.1 22.6-22.6c0-6-2.4-11.8-6.6-16L384 432 64 432 22.6 473.4z" fill="currentColor"/></svg>
        </span>
        <span class="mark">Agent Harness <b>Atlas</b></span>
      </div>
      <span class="spacer"></span>
      <a class="icon-btn" id="ghLink" href="https://github.com/agent-harness-atlas/agent-harness-atlas.github.io" target="_blank" rel="noopener noreferrer" aria-label="GitHub 仓库" title="GitHub">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
      </a>
      <button class="icon-btn" id="langBtn" type="button" aria-label="Switch language" title="中文 / English">
        <svg viewBox="0 0 24 24" width="19" height="19" fill="currentColor" aria-hidden="true">
          <path d="M18.5 10L22.9 21H20.745L19.544 18H15.454L14.255 21H12.101L16.5 10H18.5ZM10 2V4H16V6L14.0322 6.0006C13.2425 8.36616 11.9988 10.5057 10.4115 12.301C11.1344 12.9457 11.917 13.5176 12.7475 14.0079L11.9969 15.8855C10.9237 15.2781 9.91944 14.5524 8.99961 13.7249C7.21403 15.332 5.10914 16.5553 2.79891 17.2734L2.26257 15.3442C4.2385 14.7203 6.04543 13.6737 7.59042 12.3021C6.46277 11.0281 5.50873 9.57985 4.76742 8.00028L7.00684 8.00037C7.57018 9.03885 8.23979 10.0033 8.99967 10.877C10.2283 9.46508 11.2205 7.81616 11.9095 6.00101L2 6V4H8V2H10ZM17.5 12.8852L16.253 16H18.745L17.5 12.8852Z"/>
        </svg>
      </button>
      <button class="icon-btn" id="themeBtn" type="button" aria-label="Toggle theme" title="浅色 / 深色">
        <svg class="i-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.7"/>
          <path d="M12 2v2.5M12 19.5V22M22 12h-2.5M4.5 12H2M19.07 4.93l-1.77 1.77M6.7 17.3l-1.77 1.77M19.07 19.07l-1.77-1.77M6.7 6.7 4.93 4.93" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
        <svg class="i-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
          <path d="M20 14.5A8 8 0 0 1 9.5 4 7 7 0 1 0 20 14.5Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </nav>

  <main class="wrap">
    <header class="hd">
      <div>
        <div class="hd-meta">
          <span id="updated">—</span>
        </div>
        <h1 class="hd-title" id="h1"></h1>
      </div>
      <p class="hd-lede" id="lede"></p>
    </header>

    <section>
      <div class="matrix-shell">
        <div class="scroll-x">
          <table id="matrix">
            <colgroup id="cols"></colgroup>
            <thead><tr id="head"></tr></thead>
            <tbody id="body"></tbody>
          </table>
        </div>
      </div>
      <div class="legend" id="legend"></div>
    </section>

    <footer class="ft">
      <span id="footLine">Built by Open Design &amp; Claude</span>
    </footer>
  </main>

  <script type="module" src="/src/index.ts"></script>
</body>
</html>
